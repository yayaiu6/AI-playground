<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Check current URL parts
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;

        // If the path is exactly the repo name without the trailing slash
        if (path === '/ai-playground') {
            // Force the trailing slash and keep the query parameters
            window.location.replace('/ai-playground/' + search + hash);
        } else {
            // Default fallback to the main page
            window.location.replace('/ai-playground/');
        }
    </script>
</head>
<body style="background: #f8fafc; text-align: center; font-family: sans-serif; padding-top: 50px; color: #334155;">
    <h2>Loading Portfolio...</h2>
</body>
</html>
